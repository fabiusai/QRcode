<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reindirizzamento</title>
  
  <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #333; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; padding: 20px; }
    .modal-content { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 680px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; font-size: 1.25rem; }
    .link-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    input.slug { width: 22%; }
    input.url { width: 48%; }
    button { background: #2563eb; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    button:hover { opacity: 0.9; }
    button.btn-sec { background: #64748b; }
    button.btn-danger { background: #ef4444; padding: 8px 10px; }
    .actions { display: flex; justify-content: space-between; margin-top: 16px; border-top: 1px solid #eee; padding-top: 16px; align-items: center; }
    
    /* Box Personalizzazione & Anteprima QR Code */
    #qrPreviewContainer { display: none; margin-top: 20px; padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
    .qr-custom-panel { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0; }
    .qr-custom-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
    .qr-custom-item input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }
    #canvasContainer { display: inline-block; margin: 10px 0; }
  </style>
</head>
<body>

  <p id="msg-redirect" style="text-align: center; margin-top: 40px;">Reindirizzamento in corso...</p>

  <div id="adminModal" class="modal-overlay">
    <div class="modal-content">
      <h2>⚙️ Gestione & Generatore QR Code Personalizzato</h2>
      
      <div style="margin-bottom: 15px;">
        <label style="font-size: 12px; display: block; margin-bottom: 4px; font-weight: 600;">GitHub Personal Access Token:</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" style="width: 95%;">
      </div>

      <div id="linksContainer"></div>

      <button type="button" onclick="aggiungiRiga()" style="background: #10b981; margin-top: 8px;">+ Aggiungi Nuovo Link</button>

      <div id="qrPreviewContainer">
        <h3 id="qrTitle" style="margin: 0 0 10px 0; font-size: 14px;"></h3>

        <div class="qr-custom-panel">
          <div class="qr-custom-item">
            <label>Colore QR:</label>
            <input type="color" id="qrColorDots" value="#000000" onchange="aggiornaStileQR()">
          </div>
          <div class="qr-custom-item">
            <label>Sfondo:</label>
            <input type="color" id="qrColorBg" value="#ffffff" onchange="aggiornaStileQR()">
          </div>
          <div class="qr-custom-item">
            <label>Logo centrale:</label>
            <input type="file" id="qrLogoInput" accept="image/*" onchange="caricaLogo(event)" style="font-size: 11px; width: 160px;">
          </div>
        </div>

        <div id="canvasContainer"></div>
        <br>
        
        <div style="display: flex; gap: 8px; justify-content: center; margin-top: 8px;">
          <button type="button" onclick="scaricaQR('png')" style="background: #059669;">⬇️ Scarica PNG</button>
          <button type="button" onclick="scaricaQR('svg')" style="background: #0284c7;">⬇️ Scarica SVG (Vettoriale)</button>
        </div>
      </div>

      <div class="actions">
        <span id="status" style="font-size: 12px; color: #666;"></span>
        <button type="button" onclick="salvaSuGithub()">💾 Salva Modifiche</button>
      </div>
    </div>
  </div>

  <script>
    const REPO_OWNER = "TUO_USERNAME";
    const REPO_NAME = "TUO_REPOSITORY";
    const ADMIN_KEY = "segreto123";

    let currentData = {};
    let fileSha = "";
    let qrCodeStyling = null;
    let currentTargetUrl = "";
    let currentLogoBase64 = "";

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const adminParam = urlParams.get('admin');

      if (adminParam === ADMIN_KEY) {
        document.getElementById('msg-redirect').style.display = 'none';
        document.getElementById('adminModal').style.display = 'flex';
        await caricaDatiAdmin();
        return;
      }

      try {
        const res = await fetch('./redirects.json?v=' + Date.now());
        const redirects = await res.json();
        let chiave = (urlParams.keys().next().value || urlParams.get('id') || window.location.hash.replace('#', '')).toLowerCase();
        const destinazione = redirects[chiave] || redirects['default'] || 'https://google.com';
        window.location.replace(destinazione);
      } catch (e) {
        document.getElementById('msg-redirect').innerText = "Errore nel reindirizzamento.";
      }
    }

    async function caricaDatiAdmin() {
      const token = localStorage.getItem('gh_token') || '';
      document.getElementById('ghToken').value = token;

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/redirects.json`, {
          headers: token ? { 'Authorization': `token ${token}` } : {}
        });
        const data = await res.json();
        fileSha = data.sha;
        currentData = JSON.parse(atob(data.content));
        renderForm();
      } catch (e) {
        document.getElementById('status').innerText = "Errore nel caricamento dei dati da GitHub.";
      }
    }

    function renderForm() {
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';
      for (const [slug, url] of Object.entries(currentData)) {
        container.appendChild(creaRigaInput(slug, url));
      }
    }

    function creaRigaInput(slug = '', url = '') {
      const div = document.createElement('div');
      div.className = 'link-row';
      div.innerHTML = `
        <input type="text" class="slug" value="${slug}" placeholder="es: menu">
        <input type="url" class="url" value="${url}" placeholder="https://...">
        <button type="button" class="btn-sec" onclick="mostraQR(this)" title="Mostra e Personalizza QR">👁️ QR</button>
        <button type="button" class="btn-danger" onclick="this.parentElement.remove()">✕</button>
      `;
      return div;
    }

    function aggiungiRiga() {
      document.getElementById('linksContainer').appendChild(creaRigaInput());
    }

    // GESTIONE GENERAZIONE E STILE QR CODE
    function mostraQR(btn) {
      const row = btn.parentElement;
      const slug = row.querySelector('.slug').value.trim().toLowerCase();
      if (!slug) return alert("Inserisci prima lo slug (es. 'menu')!");

      const baseUrl = window.location.origin + window.location.pathname;
      currentTargetUrl = `${baseUrl}?${slug}`;

      document.getElementById('qrPreviewContainer').style.display = 'block';
      document.getElementById('qrTitle').innerText = `Personalizza QR Code per: ?${slug}`;

      // Inizializza l'oggetto QR con Stile Avanzato
      qrCodeStyling = new QRCodeStyling({
        width: 260,
        height: 260,
        type: "canvas",
        data: currentTargetUrl,
        imageOptions: {
          crossOrigin: "anonymous",
          margin: 5,
          imageSize: 0.3 // Dimensione del logo al centro (30%)
        },
        dotsOptions: {
          color: document.getElementById('qrColorDots').value,
          type: "rounded" // Moduli leggermente arrotondati (stile moderno)
        },
        backgroundOptions: {
          color: document.getElementById('qrColorBg').value,
        },
        qrOptions: {
          errorCorrectionLevel: "H" // Massimo livello di correzione per garantire la lettura con il logo
        }
      });

      const container = document.getElementById('canvasContainer');
      container.innerHTML = '';
      qrCodeStyling.append(container);
    }

    // Aggiorna in tempo reale i colori quando cambi i selettori
    function aggiornaStileQR() {
      if (!qrCodeStyling) return;
      qrCodeStyling.update({
        dotsOptions: { color: document.getElementById('qrColorDots').value },
        backgroundOptions: { color: document.getElementById('qrColorBg').value },
        image: currentLogoBase64
      });
    }

    // Converte il logo caricato in base64 e lo applica al QR
    function caricaLogo(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        currentLogoBase64 = e.target.result;
        aggiornaStileQR();
      };
      reader.readAsDataURL(file);
    }

    function scaricaQR(formato) {
      if (!qrCodeStyling) return;
      const slugInput = document.querySelector('#qrPreviewContainer h3').innerText.replace('Personalizza QR Code per: ?', '');
      qrCodeStyling.download({
        name: `qrcode-${slugInput}`,
        extension: formato
      });
    }

    async function salvaSuGithub() {
      const token = document.getElementById('ghToken').value.trim();
      if (!token) return alert("Inserisci il Personal Access Token di GitHub!");
      
      localStorage.setItem('gh_token', token);
      document.getElementById('status').innerText = "Salvataggio su GitHub in corso...";

      const nuoviRedirects = {};
      document.querySelectorAll('.link-row').forEach(row => {
        const slug = row.querySelector('.slug').value.trim().toLowerCase();
        const url = row.querySelector('.url').value.trim();
        if (slug && url) nuoviRedirects[slug] = url;
      });

      const contentEncoded = btoa(JSON.stringify(nuoviRedirects, null, 2));

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/redirects.json`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: "Aggiornamento reindirizzamenti via Modale Admin",
            content: contentEncoded,
            sha: fileSha
          })
        });

        if (res.ok) {
          const resData = await res.json();
          fileSha = resData.content.sha;
          document.getElementById('status').innerText = "✅ Salvato con successo!";
        } else {
          document.getElementById('status').innerText = "❌ Errore durante il salvataggio.";
        }
      } catch (e) {
        document.getElementById('status').innerText = "❌ Errore di rete.";
      }
    }

    init();
  </script>
</body>
</html>
